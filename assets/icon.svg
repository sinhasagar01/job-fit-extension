<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rounded-square indigo background -->
  <rect width="128" height="128" rx="26" fill="#4f46e5"/>
  <!-- Single bold ring -->
  <circle cx="64" cy="74" r="26" fill="none" stroke="white" stroke-width="9"/>
  <!-- Center bullseye dot -->
  <circle cx="64" cy="74" r="10" fill="white"/>
  <!-- Upward arrow from target center -->
  <line x1="64" y1="74" x2="64" y2="24" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <polyline points="50,40 64,24 78,40" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
